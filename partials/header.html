<!-- =========================================
     HEADER
     ========================================= -->

<header class="site-header" role="banner">

  <nav class="fixed-nav-container">
    <div class="container header-inner">

      <!-- LEFT SIDE -->
      <a href="contact.html" class="button-get-in-touch">
        GET IN TOUCH &nearrow;
      </a>

      <!-- RIGHT SIDE -->
      <button type="button" class="menu-toggle" aria-label="Open menu">
        Menu
      </button>

    </div>
  </nav>

</header>


<!-- =========================================
     FULL SCREEN MENU OVERLAY
     ========================================= -->

<div class="menu-overlay" id="fullScreenMenu">

  <!-- Close -->
  <button class="menu-close" aria-label="Close menu">×</button>

  <!-- Branding -->
  <div class="menu-intro-branding">
    <div class="placeholder-logo">K</div>
    <div class="branding-text">Company Name and Partners</div>
  </div>

  <!-- Navigation -->
  <nav class="menu-nav">
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="experience.html">Experience</a>
    <a href="contact.html">Contact</a>
  </nav>

</div>


<!-- =========================================
     MENU SCRIPT
     ========================================= -->

<script>
  const menuToggle = document.querySelector('.menu-toggle');
  const menuOverlay = document.getElementById('fullScreenMenu');
  const menuClose = document.querySelector('.menu-close');

  menuToggle.addEventListener('click', () => {
    menuOverlay.classList.add('active');
    document.body.classList.add('menu-open');
  });

  menuClose.addEventListener('click', () => {
    menuOverlay.classList.remove('active');
    document.body.classList.remove('menu-open');
  });
</script>
